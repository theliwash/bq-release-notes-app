<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BigQuery Release Radar - Google Cloud Updates Tracker</title>
    <meta name="description" content="A beautiful developer dashboard to track and share BigQuery release notes and updates in real-time.">
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://www.gstatic.com/images/branding/product/1x/bigquery_64dp.png">
    <!-- Stylesheet -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <!-- Header Navigation -->
    <header>
        <div class="header-content">
            <div class="logo-group">
                <div class="logo-icon">BQ</div>
                <div class="logo-text">
                    <h1>Release Radar</h1>
                    <p>BigQuery Release Tracker</p>
                </div>
            </div>
            <div class="actions-group">
                <div class="status-pill">
                    <span class="status-dot" id="statusDot"></span>
                    <span id="statusText">Idle</span>
                </div>
                <button class="btn btn-secondary btn-icon-only" id="refreshBtn" title="Refresh Release Notes">
                    <svg class="spinner-icon" id="refreshIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container">

        <!-- Stats Dashboard -->
        <section class="stats-dashboard">
            <div class="stat-card">
                <span class="stat-label">Total Updates</span>
                <span class="stat-value" id="statTotal">-</span>
            </div>
            <div class="stat-card" style="border-left: 3px solid var(--color-feature)">
                <span class="stat-label">Features</span>
                <span class="stat-value" id="statFeatures">-</span>
            </div>
            <div class="stat-card" style="border-left: 3px solid var(--color-announcement)">
                <span class="stat-label">Announcements</span>
                <span class="stat-value" id="statAnnouncements">-</span>
            </div>
            <div class="stat-card" style="border-left: 3px solid var(--color-issue)">
                <span class="stat-label">Issues & Fixes</span>
                <span class="stat-value" id="statIssues">-</span>
            </div>
        </section>

        <!-- Search and Filters Board -->
        <section class="controls-board">
            <div class="search-wrapper">
                <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" class="search-input" id="searchInput" placeholder="Search updates by keyword..." aria-label="Search updates">
            </div>
            
            <div class="filter-tabs" id="filterTabs">
                <button class="tab-item active" data-filter="all">All Updates</button>
                <button class="tab-item" data-filter="Feature">Features</button>
                <button class="tab-item" data-filter="Announcement">Announcements</button>
                <button class="tab-item" data-filter="Changed">Changes</button>
                <button class="tab-item" data-filter="Issue">Issues</button>
                <button class="tab-item" data-filter="Fixed">Fixes</button>
                <button class="tab-item" data-filter="Deprecated">Deprecations</button>
            </div>
        </section>

        <!-- Feed List -->
        <section class="updates-list" id="updatesContainer">
            <!-- Loading Skeleton -->
            <div style="text-align: center; padding: 3rem;">
                <p style="color: var(--text-secondary);">Loading release notes...</p>
            </div>
        </section>

    </main>

    <!-- Tweet Composer Modal Overlay -->
    <div class="modal-overlay" id="tweetModal">
        <div class="modal-container">
            <div class="modal-header">
                <div class="modal-title">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                    </svg>
                    <span>Compose Tweet</span>
                </div>
                <button class="modal-close" id="closeModalBtn" aria-label="Close modal">&times;</button>
            </div>
            <div class="modal-body">
                <div class="tweet-preview-card">
                    <div class="avatar-wrapper">
                        <div class="simulated-avatar">BQ</div>
                    </div>
                    <div class="tweet-compose-area">
                        <div class="user-info">
                            <span class="user-name">Google BigQuery Tracker</span>
                            <span class="user-handle">@bq_release_radar</span>
                        </div>
                        <textarea class="tweet-textarea" id="tweetTextarea" placeholder="What's happening?" maxlength="500"></textarea>
                        
                        <div class="tweet-link-attachment">
                            <div class="attachment-icon">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
                                    <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
                                </svg>
                            </div>
                            <div class="attachment-info">
                                <div class="attachment-title" id="attachmentTitle">BigQuery Release Notes</div>
                                <div class="attachment-desc" id="attachmentLink">https://docs.cloud.google.com/bigquery/...</div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="tweet-footer">
                    <div class="char-counter-ring" id="charCounter">
                        <span id="charCount">0</span>/280
                    </div>
                    <button class="btn btn-primary btn-tweet" id="postTweetBtn">
                        Post to X
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Application Script -->
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
